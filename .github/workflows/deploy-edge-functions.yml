name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: bafzwrvgffyxbiqfbitm

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          FUNCTIONS=(
            create-share
            explain-word
            generate-profile-cover
            generate-quiz
            generate-story
            generate-story-onboarding
            get-share
            import-story
            manage-users
            prepare-custom-theme
            register-user
            speech-to-text
            text-to-speech
            translate-labels
            verify-login
          )

          for fn in "${FUNCTIONS[@]}"; do
            echo "--- Deploying $fn ---"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt
          done
